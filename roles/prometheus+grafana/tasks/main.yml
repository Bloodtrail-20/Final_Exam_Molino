---
- name: Remove Podman Docker wrapper if present
  ansible.builtin.yum:
    name: podman-docker
    state: absent
  ignore_errors: true
  when: ansible_os_family == "RedHat"

- name: Add Docker repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    state: present
  when: ansible_os_family == "Debian"

- name: Add Docker repository (CentOS/RHEL 9)
  ansible.builtin.command: >
    dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: Install Docker engine (Debian)
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Install Docker engine (CentOS)
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  when: ansible_os_family == "RedHat"

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Install Python3 pip (Debian)
  ansible.builtin.apt:
    name: python3-pip
    state: present
  when: ansible_os_family == "Debian"

- name: Install Python3 pip (CentOS)
  ansible.builtin.yum:
    name: python3-pip
    state: present
  when: ansible_os_family == "RedHat"

- name: Install Docker SDK for Python (Debian via APT)
  ansible.builtin.apt:
    name: python3-docker
    state: present
  when: ansible_os_family == "Debian"

- name: Install Docker SDK for Python (CentOS via pip)
  ansible.builtin.pip:
    name: docker
    executable: pip3
    state: latest
  when: ansible_os_family == "RedHat"

- name: Pull Prometheus image first
  community.docker.docker_image:
    name: prom/prometheus:latest
    source: pull
    timeout: 300

- name: Deploy Prometheus container
  community.docker.docker_container:
    name: "{{ monitoring_prometheus.container_name }}"
    image: "{{ monitoring_prometheus.image }}"
    state: started
    restart_policy: always
    ports:
      - "{{ monitoring_prometheus.port }}:9090"
    docker_host: "unix:///var/run/docker.sock"
    timeout: 300

- name: Pull Grafana image first
  community.docker.docker_image:
    name: grafana/grafana:latest
    source: pull
    timeout: 300

- name: Deploy Grafana container
  community.docker.docker_container:
    name: "{{ monitoring_grafana.container_name }}"
    image: "{{ monitoring_grafana.image }}"
    state: started
    restart_policy: always
    ports:
      - "{{ monitoring_grafana.port }}:3000"
    docker_host: "unix:///var/run/docker.sock"
    timeout: 300
